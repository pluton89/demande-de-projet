<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plutoniumROAR | Demande de Projet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: #0d0e12; 
            color: #e2e8f0; 
            line-height: 1.6;
            background-image: radial-gradient(circle at top right, rgba(0, 255, 204, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(157, 0, 255, 0.05), transparent 40%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(20, 22, 31, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px; 
            border-radius: 16px; 
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .container:hover {
            border-color: rgba(0, 255, 204, 0.2);
            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.05);
        }

        h1 {
            text-align: center;
            font-size: 2rem; 
            color: #fff; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        .info {
            background: rgba(20, 22, 31, 0.4);
            border-left: 4px solid #00ffcc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            color: #94a3b8;
            font-size: 0.95rem;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .info strong {
            color: #fff;
            font-weight: 800;
        }

        label {
            display: block;
            margin-bottom: 8px;
            margin-top: 20px;
            font-weight: bold;
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px;
            background: rgba(15, 17, 23, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #e2e8f0;
            outline: none;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            background: rgba(15, 17, 23, 0.9);
        }

        textarea {
            min-height: 180px;
            resize: vertical;
        }

        button {
            display: block; 
            width: 100%; 
            margin-top: 35px; 
            padding: 16px 45px; 
            background: linear-gradient(135deg, #00ffcc, #00b3ff); 
            color: #000; 
            border: none;
            font-weight: 900; 
            border-radius: 8px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.2);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 255, 204, 0.4);
            background: #fff;
        }

        .status {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Demande de Projet</h1>

    <div class="info">
        ⚠️ <strong>Information importante :</strong><br><br>
        Tous les projets sont <strong>payants</strong>.<br>
        Les prix seront <strong>négociables en privé</strong> 
        <br><br>
        Merci de remplir le formulaire avec le plus de détails possible
    </div>

    <form id="projectForm">

        <label>Prénom</label>
        <input type="text" id="prenom" required>

        <label>Discord,mail</label>
        <input type="text" id="discord" placeholder="Pseudo ou Pseudo#0000" required>

        <label>Description du projet</label>
        <textarea id="projet" required></textarea>

        <button type="submit">Envoyer la demande</button>

        <div class="status" id="status"></div>

    </form>

</div>

<script>
document.getElementById("projectForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const prenom = document.getElementById("prenom").value;
    const discord = document.getElementById("discord").value;
    const projet = document.getElementById("projet").value;

    const webhookURL = "https://discord.com/api/webhooks/1516978175941541920/bj17sGsd3rptfLCZ53FitIu339aid2tYpPqH29KXh0UHOWIG45PIKkLVfPRzvdxlPMoF";

    const data = {
        content:
`📩 Nouvelle demande de projet

👤 Prénom : ${prenom}

🎮 Discord : ${discord}

🚀 Projet :
${projet}`
    };

    try{
        await fetch(webhookURL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(data)
        });

        document.getElementById("status").style.color = "#00ffcc";
        document.getElementById("status").innerHTML = "✅ Demande envoyée avec succès !";
        document.getElementById("projectForm").reset();

    }catch(err){
        document.getElementById("status").style.color = "#ff4a4a";
        document.getElementById("status").innerHTML = "❌ Erreur lors de l'envoi.";
    }
});
</script>

</body>
</html>
